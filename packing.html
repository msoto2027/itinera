<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itinera - Packing List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Packing List</h1>
    <p>Keep track of what to bring on your trip!</p>
  </header>

  <!-- Navigation below header -->
  <nav class="top-nav">
    <a href="index.html">Home</a>
    <a href="itinerary.html">Itinerary</a>
    <a href="expenses.html">Expenses</a>
  </nav>

  <section class="card">
    <h2>Add Item</h2>

    <!-- Input and Add button -->
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="Packing item">
      <button onclick="addItem()">Add</button>
    </div>

    <!-- Packing list -->
    <ul id="packingList">
      <!-- Items will appear here -->
    </ul>
  </section>

  <!-- Link external JavaScript -->
  <script src="packing.js"></script>

</body>
</html>
