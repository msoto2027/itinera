<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itinera - Destinations</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Destinations</h1>
    <p>Plan your trip destinations!</p>
  </header>

  <!-- Navigation below header -->
  <nav class="top-nav">
    <a href="index.html">Home</a>
    <a href="itinerary.html">Itinerary</a>
    <a href="packing.html">Packing List</a>
    <a href="expenses.html">Expenses</a>
  </nav>

  <section class="card">
    <h2>Add Destination</h2>

    <div class="input-row">
      <input type="text" id="destinationInput" placeholder="Destination name">
      <input type="date" id="startDateInput" placeholder="Start date">
      <input type="date" id="endDateInput" placeholder="End date">
      <button onclick="addDestination()">Add</button>
    </div>

    <ul id="destinationList">
      <!-- Destinations will appear here -->
    </ul>
  </section>

  <!-- Link external JavaScript -->
  <script src="destinations.js"></script>

</body>
</html>
