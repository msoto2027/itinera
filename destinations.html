<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itinera - Destinations</title>
  <link rel="stylesheet" href="style.css">
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
</head>
<body class="destinations-page">

  <header>
    <h1>Destinations</h1>
    <p>Plan your trip destinations!</p>
  </header>

  <!-- Navigation below header -->
  <nav class="top-nav">
    <a href="index.html">Home</a>
    <a href="itinerary.html">Itinerary</a>
    <a href="packing.html">Packing List</a>
    <a href="expenses.html">Expenses</a>
  </nav>

  <section class="card">
    <h2>Add Destination</h2>

    <div class="input-row">
      <input type="text" id="destinationInput" placeholder="Destination name">
      <input type="date" id="startDateInput" placeholder="Start date">
      <input type="date" id="endDateInput" placeholder="End date">
      <button id="addDestinationBtn" onclick="addDestination()">Add</button>
    </div>

    <ul id="destinationList">
      <!-- Destinations will appear here -->
    </ul>
  </section>

  <section class="card">
    <h2>Destination Map</h2>
    <div id="destinationMap" aria-label="Map of planned destinations"></div>
  </section>

  <script src="script.js"></script>
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <!-- Link external JavaScript -->
  <script src="destinations.js"></script>

</body>
</html>
