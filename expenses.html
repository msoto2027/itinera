<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itinera - Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Expense Tracker</h1>
    <p>Keep track of your travel expenses!</p>
  </header>

  <!-- Navigation below header -->
  <nav class="top-nav">
    <a href="index.html">Home</a>
    <a href="itinerary.html">Itinerary</a>
    <a href="packing.html">Packing List</a>
    <a href="destinations.html">Destinations</a>
  </nav>

  <section class="card">
    <h2>Add Expense</h2>

    <!-- Inputs and Add button -->
    <div class="input-row">
      <input type="text" id="expenseName" placeholder="Expense Name">
      <input type="number" id="expenseAmount" placeholder="Amount" step="0.01">
      <input type="text" id="expensePayer" placeholder="Payer">
      <input type="date" id="expenseDueDate" placeholder="Due Date">
      <button onclick="addExpense()">Add</button>
    </div>

    <!-- Expense list -->
    <ol id="expenseList">
      <!-- Expenses will appear here -->
    </ol>
  </section>

  <!-- Link external JavaScript -->
  <script src="expenses.js"></script>

</body>
</html>
