<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Itinera - Travel Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Itinera </h1>

  <section>
    <h2>Itinerary</h2>
    <input type="text" id="itineraryInput" placeholder="Add activity">
    <button onclick="addItinerary()">Add</button>
    <ul id="itineraryList"></ul>
  </section>

  <section>
    <h2>Packing List</h2>
    <input type="text" id="packingInput" placeholder="Add item">
    <button onclick="addPacking()">Add</button>
    <ul id="packingList"></ul>
  </section>

  <script src="script.js"></script>
</body>
</html>
